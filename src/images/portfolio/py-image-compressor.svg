<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="20" fill="transparent"/>
  <!-- Large image file -->
  <rect x="75" y="50" width="110" height="130" rx="10" fill="#0f1f3a" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="90" y="72" width="80" height="55" rx="5" fill="#2563eb" opacity="0.3"/>
  <circle cx="115" cy="95" r="14" fill="#60a5fa" opacity="0.5"/>
  <path d="M135 82 L155 105 L138 112" fill="#93c5fd" opacity="0.4"/>
  <text x="130" y="165" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="13" font-weight="600">2.4 MB</text>
  <!-- Arrow -->
  <path d="M195 115 L235 115" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  <path d="M225 105 L237 115 L225 125" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small compressed file -->
  <rect x="245" y="70" width="80" height="90" rx="10" fill="#0a2818" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="258" y="88" width="54" height="36" rx="4" fill="#166534" opacity="0.3"/>
  <circle cx="278" cy="103" r="9" fill="#4ade80" opacity="0.5"/>
  <path d="M290 94 L300 105 L290 108" fill="#86efac" opacity="0.4"/>
  <text x="285" y="145" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="11" font-weight="600">.webp</text>
  <!-- Progress bar -->
  <rect x="110" y="200" width="180" height="14" rx="7" fill="#1e293b"/>
  <rect x="110" y="200" width="168" height="14" rx="7" fill="#22c55e"/>
  <text x="200" y="236" text-anchor="middle" fill="#4ade80" font-family="system-ui" font-size="14" font-weight="700">95% smaller</text>
  <!-- Labels -->
  <text x="200" y="290" text-anchor="middle" fill="#ffffff" font-family="system-ui" font-size="20" font-weight="700">py-image-compressor</text>
  <text x="200" y="318" text-anchor="middle" fill="#d4d4d4" font-family="system-ui" font-size="16">Batch Image Converter</text>
  <text x="200" y="386" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="14" font-weight="600">Python</text>
</svg>
