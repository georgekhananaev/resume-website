<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ldBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="ldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#ldBg)"/>
  <circle cx="200" cy="200" r="180" fill="url(#ldGlow)"/>

  <!-- TV bezel outer -->
  <rect x="50" y="90" width="300" height="200" rx="12" fill="none" stroke="#6366f1" stroke-width="3"/>
  <rect x="60" y="100" width="280" height="180" rx="6" fill="#050510"/>

  <!-- Widget grid inside the dashboard -->
  <g>
    <!-- Row 1 -->
    <rect x="72" y="112" width="80" height="50" rx="4" fill="#6366f1" opacity="0.8"/>
    <rect x="160" y="112" width="50" height="50" rx="4" fill="#818cf8" opacity="0.55"/>
    <rect x="218" y="112" width="60" height="50" rx="4" fill="#a5b4fc" opacity="0.45"/>
    <rect x="286" y="112" width="42" height="50" rx="4" fill="#6366f1" opacity="0.6"/>

    <!-- Row 2 (big widgets) -->
    <rect x="72" y="170" width="120" height="44" rx="4" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="80" y1="192" x2="92" y2="184"/>
    <line x1="92" y1="184" x2="108" y2="198"/>
    <line x1="108" y1="198" x2="128" y2="178"/>
    <line x1="128" y1="178" x2="148" y2="188"/>
    <line x1="148" y1="188" x2="168" y2="182"/>
    <line x1="168" y1="182" x2="184" y2="174"/>
    <g stroke="#818cf8" stroke-width="1.5" fill="none">
      <polyline points="80,192 92,184 108,198 128,178 148,188 168,182 184,174"/>
    </g>

    <rect x="200" y="170" width="128" height="44" rx="4" fill="#a5b4fc" opacity="0.25"/>
    <rect x="208" y="180" width="18" height="24" fill="#a5b4fc"/>
    <rect x="232" y="176" width="18" height="28" fill="#818cf8"/>
    <rect x="256" y="184" width="18" height="20" fill="#6366f1"/>
    <rect x="280" y="172" width="18" height="32" fill="#a5b4fc"/>
    <rect x="304" y="178" width="18" height="26" fill="#818cf8"/>

    <!-- Row 3 -->
    <rect x="72" y="222" width="56" height="46" rx="4" fill="#818cf8" opacity="0.5"/>
    <rect x="136" y="222" width="56" height="46" rx="4" fill="#6366f1" opacity="0.7"/>
    <rect x="200" y="222" width="56" height="46" rx="4" fill="#a5b4fc" opacity="0.4"/>
    <rect x="264" y="222" width="64" height="46" rx="4" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- TV stand -->
  <rect x="180" y="300" width="40" height="8" fill="#6366f1"/>
  <rect x="150" y="308" width="100" height="4" fill="#818cf8"/>

  <!-- "LIVE" indicator -->
  <circle cx="320" cy="110" r="4" fill="#818cf8"/>
  <text x="328" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#a5b4fc">LIVE</text>
</svg>
