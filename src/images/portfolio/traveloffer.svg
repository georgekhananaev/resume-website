<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="toBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="toGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#toBg)"/>
  <circle cx="200" cy="200" r="180" fill="url(#toGlow)"/>

  <!-- Booking flow: 4 stacked cards representing offer → cart → auth → payment -->
  <g>
    <rect x="100" y="80" width="200" height="50" rx="8" fill="none" stroke="#6366f1" stroke-width="2"/>
    <text x="200" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c7d2fe" text-anchor="middle">Search offers</text>

    <rect x="100" y="150" width="200" height="50" rx="8" fill="none" stroke="#818cf8" stroke-width="2"/>
    <text x="200" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c7d2fe" text-anchor="middle">Build itinerary</text>

    <rect x="100" y="220" width="200" height="50" rx="8" fill="none" stroke="#a5b4fc" stroke-width="2"/>
    <text x="200" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#c7d2fe" text-anchor="middle">Authenticate</text>

    <rect x="100" y="290" width="200" height="50" rx="8" fill="#6366f1"/>
    <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Pay with Stripe</text>
  </g>

  <!-- Flow arrows between cards -->
  <g stroke="#818cf8" stroke-width="1.5" fill="#818cf8" opacity="0.6">
    <line x1="200" y1="130" x2="200" y2="148"/>
    <polygon points="197,144 203,144 200,151"/>
    <line x1="200" y1="200" x2="200" y2="218"/>
    <polygon points="197,214 203,214 200,221"/>
    <line x1="200" y1="270" x2="200" y2="288"/>
    <polygon points="197,284 203,284 200,291"/>
  </g>

  <!-- Language tags on the side (multi-lang indicator) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#818cf8" opacity="0.7">
    <text x="60" y="60">EN</text>
    <text x="60" y="75">AR</text>
    <text x="60" y="90">HE</text>
  </g>
</svg>
