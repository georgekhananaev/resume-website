<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="shBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="shGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#shBg)"/>
  <circle cx="200" cy="200" r="180" fill="url(#shGlow)"/>

  <!-- Three tickets stacked and angled -->
  <g>
    <!-- Back ticket -->
    <g transform="translate(90,130) rotate(-8)">
      <rect x="0" y="0" width="180" height="110" rx="10" fill="#a5b4fc" opacity="0.25" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="12" y="20" width="90" height="8" rx="4" fill="#818cf8" opacity="0.5"/>
      <rect x="12" y="36" width="130" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
      <rect x="12" y="50" width="110" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
      <circle cx="160" cy="22" r="6" fill="#6366f1" opacity="0.6"/>
    </g>

    <!-- Middle ticket -->
    <g transform="translate(100,145) rotate(-2)">
      <rect x="0" y="0" width="190" height="115" rx="10" fill="#818cf8" opacity="0.35" stroke="#818cf8" stroke-width="1.5"/>
      <rect x="14" y="22" width="100" height="9" rx="4" fill="#a5b4fc" opacity="0.7"/>
      <rect x="14" y="40" width="140" height="6" rx="3" fill="#a5b4fc" opacity="0.55"/>
      <rect x="14" y="54" width="120" height="6" rx="3" fill="#a5b4fc" opacity="0.55"/>
      <rect x="14" y="68" width="80" height="6" rx="3" fill="#a5b4fc" opacity="0.55"/>
      <circle cx="168" cy="24" r="7" fill="#818cf8"/>
    </g>

    <!-- Front ticket -->
    <g transform="translate(112,165) rotate(3)">
      <rect x="0" y="0" width="200" height="120" rx="10" fill="#6366f1"/>
      <rect x="16" y="22" width="110" height="10" rx="5" fill="#ffffff" opacity="0.95"/>
      <rect x="16" y="42" width="150" height="6" rx="3" fill="#ffffff" opacity="0.65"/>
      <rect x="16" y="56" width="130" height="6" rx="3" fill="#ffffff" opacity="0.65"/>
      <rect x="16" y="70" width="90" height="6" rx="3" fill="#ffffff" opacity="0.65"/>

      <!-- Priority badge -->
      <rect x="16" y="88" width="50" height="18" rx="9" fill="#ffffff"/>
      <text x="41" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#4f46e5" text-anchor="middle">URGENT</text>

      <!-- Avatar -->
      <circle cx="176" cy="24" r="9" fill="#a5b4fc"/>
      <text x="176" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="700" fill="#1e1b4b" text-anchor="middle">GK</text>
    </g>
  </g>
</svg>
