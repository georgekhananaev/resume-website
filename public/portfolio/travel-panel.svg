<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="tpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <radialGradient id="tpGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#tpBg)"/>
  <circle cx="200" cy="200" r="180" fill="url(#tpGlow)"/>

  <!-- Grid of tenant tiles -->
  <g stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.7">
    <rect x="70" y="70" width="60" height="60" rx="8"/>
    <rect x="170" y="70" width="60" height="60" rx="8"/>
    <rect x="270" y="70" width="60" height="60" rx="8"/>
    <rect x="70" y="170" width="60" height="60" rx="8"/>
    <rect x="270" y="170" width="60" height="60" rx="8"/>
    <rect x="70" y="270" width="60" height="60" rx="8"/>
    <rect x="170" y="270" width="60" height="60" rx="8"/>
    <rect x="270" y="270" width="60" height="60" rx="8"/>
  </g>

  <!-- Central hub -->
  <rect x="162" y="162" width="76" height="76" rx="12" fill="#6366f1"/>
  <rect x="172" y="172" width="56" height="56" rx="8" fill="#a5b4fc" opacity="0.85"/>
  <text x="200" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1e1b4b" text-anchor="middle">SaaS</text>

  <!-- Connection lines from hub to tiles -->
  <g stroke="#818cf8" stroke-width="1.5" opacity="0.45">
    <line x1="200" y1="162" x2="100" y2="130"/>
    <line x1="200" y1="162" x2="200" y2="130"/>
    <line x1="200" y1="162" x2="300" y2="130"/>
    <line x1="162" y1="200" x2="130" y2="200"/>
    <line x1="238" y1="200" x2="270" y2="200"/>
    <line x1="200" y1="238" x2="100" y2="270"/>
    <line x1="200" y1="238" x2="200" y2="270"/>
    <line x1="200" y1="238" x2="300" y2="270"/>
  </g>

  <!-- Dots at tile centers -->
  <g fill="#a5b4fc">
    <circle cx="100" cy="100" r="3"/>
    <circle cx="200" cy="100" r="3"/>
    <circle cx="300" cy="100" r="3"/>
    <circle cx="100" cy="200" r="3"/>
    <circle cx="300" cy="200" r="3"/>
    <circle cx="100" cy="300" r="3"/>
    <circle cx="200" cy="300" r="3"/>
    <circle cx="300" cy="300" r="3"/>
  </g>
</svg>
